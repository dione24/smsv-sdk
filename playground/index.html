<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMSv SDK — Playground</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      body {
        max-width: 820px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { margin-bottom: 0.25rem; }
      .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
      label {
        display: block;
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #94a3b8;
      }
      input, textarea, select, button {
        width: 100%;
        margin-top: 0.35rem;
        padding: 0.5rem 0.65rem;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        box-sizing: border-box;
      }
      select { cursor: pointer; }
      .row { display: flex; gap: 0.75rem; }
      .row > * { flex: 1; }
      button {
        cursor: pointer;
        background: #2563eb;
        border-color: #2563eb;
        font-weight: 600;
        margin-top: 1.25rem;
      }
      button:hover { background: #1d4ed8; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      pre {
        margin-top: 1rem;
        padding: 1rem;
        background: #020617;
        border-radius: 8px;
        overflow: auto;
        font-size: 0.8rem;
        max-height: 400px;
      }
      a { color: #38bdf8; }
      .tabs { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
      .tab {
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        background: #1e293b;
        border: 1px solid #334155;
        color: #94a3b8;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .tab.active { background: #2563eb; border-color: #2563eb; color: white; }
      .hint { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
    </style>
  </head>
  <body>
    <h1>SMSv API — Playground</h1>
    <p class="subtitle">
      Testez tous les endpoints de l'API SMSv. Pour le SDK npm :
      <code>npm i smsv-sdk</code> ·
      <a href="https://github.com/dione24/smsv-sdk" target="_blank">GitHub</a> ·
      <a href="https://smsv.tech/docs/partner-api" target="_blank">Docs API</a>
    </p>

    <div class="row">
      <div>
        <label>Base URL</label>
        <input id="base" value="http://localhost:3001/api" />
      </div>
      <div>
        <label>Clé API (X-API-Key)</label>
        <input id="key" placeholder="sk_..." autocomplete="off" />
      </div>
    </div>

    <label>Endpoint</label>
    <div class="tabs" id="tabs"></div>

    <div class="row" style="margin-top: 0.75rem">
      <div style="flex: 0 0 100px">
        <label>Méthode</label>
        <select id="method">
          <option>POST</option>
          <option>GET</option>
          <option>PUT</option>
          <option>DELETE</option>
        </select>
      </div>
      <div>
        <label>Path (après base URL)</label>
        <input id="path" value="/v1/text" />
      </div>
    </div>

    <label>Corps JSON</label>
    <textarea id="body" rows="8">{
  "to": "+22370000000",
  "message": "Test depuis le playground SMSv",
  "channel": "whatsapp"
}</textarea>
    <p class="hint">Laissez vide pour les requêtes GET.</p>

    <button type="button" id="run">Envoyer</button>

    <pre id="out">Réponse…</pre>

    <script>
      const PRESETS = [
        { label: "Send text", method: "POST", path: "/v1/text", body: { to: "+22370000000", message: "Hello from playground!", channel: "whatsapp" } },
        { label: "Send media", method: "POST", path: "/v1/send", body: { recipient: "+22370000000", type: "image", image: { url: "https://example.com/photo.jpg", caption: "Test image" } } },
        { label: "Send SMS", method: "POST", path: "/v1/text", body: { to: "+22370000000", message: "SMS test", channel: "sms" } },
        { label: "Batch", method: "POST", path: "/v1/batch", body: { messages: [{ to: "+22370000000", message: "Batch 1", channel: "whatsapp" }, { to: "+22370000001", message: "Batch 2", channel: "whatsapp" }], continueOnError: true } },
        { label: "Senders", method: "GET", path: "/v1/senders", body: null },
        { label: "Templates", method: "GET", path: "/v1/templates", body: null },
        { label: "Campaigns", method: "GET", path: "/v1/campaigns", body: null },
        { label: "Contacts", method: "GET", path: "/v1/contacts", body: null },
        { label: "Batch status", method: "GET", path: "/v1/batch/BATCH_ID", body: null },
      ];

      const $ = (id) => document.getElementById(id);
      const tabsEl = $("tabs");

      PRESETS.forEach((p, i) => {
        const btn = document.createElement("div");
        btn.className = "tab" + (i === 0 ? " active" : "");
        btn.textContent = p.label;
        btn.onclick = () => {
          tabsEl.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          btn.classList.add("active");
          $("method").value = p.method;
          $("path").value = p.path;
          $("body").value = p.body ? JSON.stringify(p.body, null, 2) : "";
        };
        tabsEl.appendChild(btn);
      });

      $("run").onclick = async () => {
        const base = $("base").value.replace(/\/$/, "");
        const key = $("key").value.trim();
        const method = $("method").value;
        const path = $("path").value;
        const out = $("out");
        const btn = $("run");

        btn.disabled = true;
        btn.textContent = "Envoi…";
        out.textContent = "Chargement…";

        try {
          const hasBody = method !== "GET" && method !== "DELETE" && $("body").value.trim();
          const opts = {
            method,
            headers: {
              "Content-Type": "application/json",
              ...(key ? { "X-API-Key": key } : {}),
            },
          };
          if (hasBody) opts.body = JSON.stringify(JSON.parse($("body").value));

          const t0 = performance.now();
          const res = await fetch(`${base}${path}`, opts);
          const elapsed = Math.round(performance.now() - t0);
          const text = await res.text();

          let pretty = text || "(empty)";
          try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch {}

          out.textContent = `${method} ${path}\n${res.status} ${res.statusText} (${elapsed}ms)\n\n${pretty}`;
        } catch (e) {
          out.textContent = String(e);
        } finally {
          btn.disabled = false;
          btn.textContent = "Envoyer";
        }
      };
    </script>
  </body>
</html>
